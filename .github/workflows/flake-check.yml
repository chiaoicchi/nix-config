name: Flake Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  flake-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - uses: DeterminateSystems/nix-installer-action@main
      - uses: DeterminateSystems/magic-nix-cache-action@main

      - name: Check flake
        run: nix flake check
      
      - name: Check flake outputs
        run: nix flake show

